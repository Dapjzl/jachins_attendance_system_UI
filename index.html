<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  
  <title>JACHINSGROUP — Attendance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- Header -->
  <div class="header">

    <div class="logo-wrap">
      <img
      src="https://lh3.googleusercontent.com/d/1Iz9eUhCm2Ua-EXbq_pQDwSiBwjvFzKxW"
      alt="Company Logo"
      style="width:115px;height:80px;object-fit:contain;border-radius:6px;"
      >
    </div>

    <div class="company-name">
      JACHINSGROUP
    </div>

    <div class="system-tag">
      Attendance Portal
    </div>

  </div>

  <!-- Alert -->
  <div id="alert"></div>

  <!-- Main Card -->
  <div class="card">

    <!-- Employee badge -->
<div class="emp-badge">

  <div class="emp-avatar">👤</div>

  <div class="emp-info">
    <div id="emp-name" class="emp-name">Loading...</div>

    <div id="emp-meta" class="emp-meta">
      Loading department...
    </div>
  </div>

  <div class="emp-status active">Active</div>

</div>

    <!-- Status bar -->
    <div class="status-bar">

      <div class="status-pill pending" id="checkin-pill">
        <span class="pill-icon">🕐</span>
        CHECK-IN<br>Pending
      </div>

      <div class="status-pill pending" id="checkout-pill">
        <span class="pill-icon">🕕</span>
        CHECK-OUT<br>Pending
      </div>

    </div>

    <!-- Live clock -->
    <div class="datetime-row">
      <span id="live-date"></span>
      <span id="live-time"></span>
    </div>

    <!-- GPS box -->
    <div class="gps-box waiting" id="gps-box">

      <span class="gps-icon">
        📡
      </span>

      <div class="gps-text">
        <strong id="gps-title">
          Acquiring GPS...
        </strong>

        <small id="gps-detail">
          Waiting for location permission
        </small>
      </div>

      <div
        class="spinner"
        id="gps-spinner"
        style="display:block"
      ></div>

    </div>

    <!-- Buttons -->
    <div class="btn-group">

      <button
        class="btn btn-checkin"
        id="btn-checkin"
        onclick="submitAction('checkin')"
        disabled
      >
        <span id="ci-spinner" class="spinner"></span>
        <span id="ci-label">⏱ Check In</span>
      </button>

      <button
        class="btn btn-checkout"
        id="btn-checkout"
        onclick="submitAction('checkout')"
        disabled
      >
        <span id="co-spinner" class="spinner"></span>
        <span id="co-label">🏁 Check Out</span>
      </button>

    </div>

  </div>

  <!-- Security -->
  <div class="sec-note">
    🔒 GPS verified | IP monitored
  </div>

  <!-- Hidden Inputs -->
  <input type="hidden" id="token">

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
